apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.15.0
    helm:
      releaseName: external-dns
      values: |
        provider: google
        domainFilters:
          - gcloud.it-n.at
        policy: sync
        registry: txt
        txtOwnerId: group-h-gcloud-platform
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: inenpt-group-h-external-dns@project-a7033755-91ce-4662-bb8.iam.gserviceaccount.com
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
